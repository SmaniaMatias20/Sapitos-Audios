<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapitos</title>

    <!-- Tu archivo CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="page">
        <section class="card">

            <h1 id="title" class="title">Cargando...</h1>

            <p class="subtitle">
                Un mensajito muy especial preparado por los chicos con mucho amor
            </p>

            <div id="container" class="audio-container"></div>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = (params.get("name") || "").toLowerCase();

        const title = document.getElementById("title");
        const container = document.getElementById("container");

        if (!name) {
            title.innerText = "QR inválido";
        } else {
            title.innerText = "Audio de " + name.toUpperCase();

            const audio = document.createElement("audio");
            audio.controls = true;
            audio.autoplay = true;

            audio.src = `/audios/${name}.ogg`;

            audio.onerror = () => {
                title.innerText = "No existe audio para: " + name;
            };

            container.appendChild(audio);
        }
    </script>

</body>

</html>
