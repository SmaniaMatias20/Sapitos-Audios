<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapitos</title>

    <!-- Tu archivo CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="page">
        <section class="card">

            <h1 id="title" class="title">Cargando...</h1>

            <p class="subtitle">
                Un mensajito muy especial preparado por los chicos con mucho amor
            </p>

            <div id="container" class="audio-container"></div>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = (params.get("name") || "").toLowerCase();

        const title = document.getElementById("title");
        const container = document.getElementById("container");

        if (!name) {
            title.innerText = "QR inválido";
        }
        else if (name == "adan") {
            title.innerText = "Un recuerdo especial de ADAN";

            const subtitle = document.getElementsByClassName("subtitle")[0];
            subtitle.innerText = "";

            const gallery = document.createElement("div");
            gallery.className = "image-gallery";

            const img1 = document.createElement("img");
            img1.src = "/imagenes/1.jpeg";
            img1.alt = "Foto 1 de Adán";

            const img2 = document.createElement("img");
            img2.src = "/imagenes/2.jpeg";
            img2.alt = "Foto 2 de Adán";

            gallery.appendChild(img1);
            gallery.appendChild(img2);

            container.appendChild(gallery);
        } else {
            title.innerText = "Audio de " + name.toUpperCase();

            const audio = document.createElement("audio");
            audio.controls = true;
            audio.autoplay = true;

            audio.src = `/audios/${name}.ogg`;

            audio.onerror = () => {
                title.innerText = "No existe audio para: " + name;
            };

            container.appendChild(audio);
        }
    </script>

</body>

</html>
