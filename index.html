<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapitos</title>
</head>

<body style="text-align:center; font-family: sans-serif;">

    <h1 id="title">Cargando...</h1>

    <div id="container"></div>

    <script>
        // 1. Obtener nombre desde la URL de forma segura
        const name = decodeURIComponent(
            window.location.pathname
                .replace("/", "")
                .toLowerCase()
                .trim()
        );

        const title = document.getElementById("title");
        const container = document.getElementById("container");

        // 2. Validación
        if (!name) {
            title.innerText = "QR inválido o sin nombre";
        } else {
            title.innerText = "Sapito de " + name;

            // 3. Crear audio dinámico
            const audio = document.createElement("audio");
            audio.controls = true;
            audio.autoplay = true;

            audio.src = `/audios/${name}.mp3`;

            // 4. Manejo de error si no existe el audio
            audio.onerror = () => {
                title.innerText = "No se encontró audio para: " + name;
            };

            container.appendChild(audio);
        }
    </script>

</body>

</html>
